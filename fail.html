<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Failed — Firstbook</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#00E676;--green-dark:#00B85C;--black:#0A0A0A;--card:#141414;--border:#2A2A2A;--text:#F0F0F0;--muted:#777;--red:#e74c3c;--font-head:'Bebas Neue',sans-serif;--font:'DM Sans',sans-serif}
body{background:var(--black);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{text-align:center;max-width:400px;width:100%}
.icon{width:88px;height:88px;border-radius:50%;background:#c0392b;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:40px;color:#fff;font-weight:700}
.title{font-family:var(--font-head);font-size:40px;letter-spacing:1px;color:var(--red);margin-bottom:8px}
.sub{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:28px}
.btn{display:inline-block;background:var(--green);color:#000;border:none;padding:13px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);text-decoration:none}
.btn:hover{background:var(--green-dark)}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">✗</div>
  <div class="title">PAYMENT FAILED</div>
  <div class="sub">Payment সফল হয়নি। আবার চেষ্টা করো অথবা অন্য payment method ব্যবহার করো।<br><br>তোমার slot এখনো available আছে।</div>
  <a href="index.html" class="btn">আবার চেষ্টা করো</a>
</div>
</body>
</html>
